<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat WebSocket — Tornado</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
        background: #f4f4f5;
      }
      body {
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      #status {
        font-size: 0.875rem;
        margin: 0.5rem 0 1rem;
        color: #52525b;
      }
      #status.connected {
        color: #15803d;
      }
      #status.disconnected {
        color: #b91c1c;
      }
      #log {
        height: 18rem;
        overflow-y: auto;
        border: 1px solid #d4d4d8;
        border-radius: 0.5rem;
        padding: 0.75rem;
        background: #fff;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      .msg-chat {
        margin: 0.35rem 0;
      }
      .msg-system {
        margin: 0.35rem 0;
        color: #71717a;
        font-style: italic;
      }
      .msg-error {
        margin: 0.35rem 0;
        color: #b91c1c;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.25rem;
        color: #52525b;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem 0.6rem;
        border: 1px solid #d4d4d8;
        border-radius: 0.375rem;
        margin-bottom: 0.75rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
      }
      .row input {
        flex: 1;
        margin-bottom: 0;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.375rem;
        background: #18181b;
        color: #fff;
        cursor: pointer;
        font-weight: 500;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Chat em tempo real (WebSocket + Tornado)</h1>
    <p id="status" class="disconnected">Desconectado</p>
    <div id="log" aria-live="polite"></div>
    <label for="name">Apelido</label>
    <input id="name" type="text" maxlength="40" placeholder="Como quer ser chamado?" />
    <button type="button" id="btnName">Atualizar apelido</button>
    <label for="message" style="margin-top: 1rem">Mensagem</label>
    <div class="row">
      <input id="message" type="text" maxlength="2000" placeholder="Digite e envie" />
      <button type="button" id="btnSend" disabled>Enviar</button>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
