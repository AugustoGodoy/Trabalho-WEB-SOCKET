<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat ao vivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        background-color: #f0f4ff;
        background-image: radial-gradient(#c7d7fc 1px, transparent 1px);
        background-size: 24px 24px;
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        gap: 1rem;
      }

      /* ── Card base ── */
      .card {
        width: 100%;
        max-width: 38rem;
        background: #ffffff;
        border-radius: 1.25rem;
        box-shadow: 0 4px 6px -1px rgba(37,99,235,.08),
                    0 10px 40px -4px rgba(37,99,235,.14);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header (compartilhado) ── */
      .header {
        padding: 1.1rem 1.4rem;
        background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .header-icon { font-size: 1.3rem; line-height: 1; }
      .header h1 {
        flex: 1;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        letter-spacing: .01em;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        background: rgba(255,255,255,.15);
        border-radius: 99px;
        padding: 0.25rem 0.65rem;
        font-size: 0.72rem;
        font-weight: 500;
        color: #fff;
      }
      .dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #fca5a5;
        transition: background .35s;
        flex-shrink: 0;
      }
      .dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

      /* ── Tela de boas-vindas ── */
      #welcome-screen { animation: fadeIn .25s ease-out; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .welcome-body {
        padding: 2rem 1.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        text-align: center;
      }
      .welcome-body p {
        font-size: 0.9rem;
        color: #64748b;
        line-height: 1.5;
      }
      .welcome-row {
        display: flex;
        gap: 0.5rem;
        width: 100%;
        max-width: 22rem;
      }
      .welcome-row input {
        flex: 1;
        background: #f8faff;
        border: 1.5px solid #dbeafe;
        border-radius: 0.6rem;
        padding: 0.6rem 0.85rem;
        font-family: inherit;
        font-size: 0.9rem;
        color: #1e293b;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
      }
      .welcome-row input::placeholder { color: #94a3b8; }
      .welcome-row input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59,130,246,.15);
      }

      /* ── Chat card (oculto até entrar) ── */
      #chat-card { display: none; animation: fadeIn .25s ease-out; }
      #chat-card.visible { display: flex; }

      /* ── Log ── */
      #log {
        height: 22rem;
        overflow-y: auto;
        padding: 1rem 1.1rem;
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        background: #f8faff;
        scroll-behavior: smooth;
      }
      #log::-webkit-scrollbar { width: 5px; }
      #log::-webkit-scrollbar-track { background: transparent; }
      #log::-webkit-scrollbar-thumb { background: #c7d7fc; border-radius: 3px; }

      /* ── Mensagens ── */
      .msg { animation: slideIn .18s ease-out; display: flex; flex-direction: column; }
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .msg-other { align-self: flex-start; max-width: 80%; }
      .msg-other .sender {
        font-size: 0.7rem; font-weight: 600;
        color: #3b82f6; margin-bottom: 2px; padding-left: 0.3rem;
      }
      .msg-other .bubble {
        background: #eff6ff; color: #1e3a5f;
        border: 1px solid #dbeafe;
        border-radius: 1rem; border-bottom-left-radius: 0.2rem;
      }
      .msg-mine { align-self: flex-end; max-width: 80%; }
      .msg-mine .bubble {
        background: #2563eb; color: #fff;
        border-radius: 1rem; border-bottom-right-radius: 0.2rem;
      }
      .msg-mine .time { color: rgba(255,255,255,.6); }

      .bubble {
        padding: 0.5rem 0.85rem;
        font-size: 0.875rem; line-height: 1.5;
        word-break: break-word;
        display: flex; align-items: flex-end; gap: 0.5rem;
      }
      .bubble .text { flex: 1; }
      .bubble .time {
        font-size: 0.65rem; color: #94a3b8;
        white-space: nowrap; flex-shrink: 0; margin-bottom: 1px;
      }
      .msg-system {
        align-self: center; font-size: 0.72rem;
        color: #94a3b8; font-style: italic;
      }
      .msg-error {
        align-self: center; font-size: 0.75rem;
        color: #dc2626; background: #fff1f1;
        border: 1px solid #fecaca; padding: 0.3rem 0.7rem; border-radius: 0.5rem;
      }

      /* ── Typing indicator ── */
      #typing-indicator {
        height: 1.4rem; padding: 0 1.1rem 0.2rem;
        background: #f8faff; font-size: 0.72rem;
        color: #94a3b8; font-style: italic;
        display: flex; align-items: center; gap: 0.3rem;
        opacity: 0; transition: opacity .2s;
      }
      #typing-indicator.visible { opacity: 1; }
      .dots span {
        display: inline-block; width: 4px; height: 4px;
        background: #94a3b8; border-radius: 50%; margin: 0 1px;
        animation: bounce .9s infinite;
      }
      .dots span:nth-child(2) { animation-delay: .15s; }
      .dots span:nth-child(3) { animation-delay: .30s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40%            { transform: translateY(-4px); }
      }

      /* ── Footer / Inputs ── */
      .footer {
        padding: 1rem 1.1rem; background: #fff;
        border-top: 1px solid #e8eef8;
        display: flex; flex-direction: column; gap: 0.65rem;
      }
      .field-label {
        font-size: 0.7rem; font-weight: 600; color: #64748b;
        letter-spacing: .04em; text-transform: uppercase; margin-bottom: 0.2rem;
      }
      .row { display: flex; gap: 0.5rem; }

      input[type="text"] {
        flex: 1; background: #f8faff;
        border: 1.5px solid #dbeafe; border-radius: 0.6rem;
        padding: 0.55rem 0.85rem; font-family: inherit;
        font-size: 0.875rem; color: #1e293b; outline: none;
        transition: border-color .2s, box-shadow .2s;
      }
      input[type="text"]::placeholder { color: #94a3b8; }
      input[type="text"]:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59,130,246,.15);
      }

      button {
        font-family: inherit; font-size: 0.875rem; font-weight: 500;
        border: none; border-radius: 0.6rem; padding: 0.55rem 1.1rem;
        cursor: pointer;
        transition: transform .12s ease, box-shadow .15s ease, background .15s ease;
      }
      button:active:not(:disabled) { transform: scale(0.95); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }

      .btn-primary {
        background: #2563eb; color: #fff;
        box-shadow: 0 2px 8px rgba(37,99,235,.3);
      }
      .btn-primary:hover:not(:disabled) {
        background: #1d4ed8;
        box-shadow: 0 4px 14px rgba(37,99,235,.4);
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: #f1f5fe; color: #3b82f6;
        border: 1.5px solid #dbeafe;
      }
      .btn-ghost:hover:not(:disabled) {
        background: #dbeafe; transform: translateY(-1px);
      }

      /* ── Rodapé da página ── */
      .page-footer {
        font-size: 0.72rem;
        color: #94a3b8;
        text-align: center;
        letter-spacing: .02em;
      }

      @media (max-width: 400px) {
        .row, .welcome-row { flex-direction: column; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>

    <!-- Tela de boas-vindas -->
    <div id="welcome-screen" class="card">
      <div class="header">
        <span class="header-icon">💬</span>
        <h1>Chat ao vivo</h1>
      </div>
      <div class="welcome-body">
        <p>Entre com um apelido para começar a conversar.</p>
        <div class="welcome-row">
          <input id="welcome-name" type="text" maxlength="40" placeholder="Seu apelido..." autofocus />
          <button type="button" id="btnEnter" class="btn-primary">Entrar</button>
        </div>
      </div>
    </div>

    <!-- Card do chat (oculto até entrar) -->
    <div id="chat-card" class="card">
      <div class="header">
        <span class="header-icon">💬</span>
        <h1>Chat ao vivo</h1>
        <div class="pill">
          <span class="dot" id="dot"></span>
          <span id="status-text">Conectando...</span>
        </div>
      </div>

      <div id="log" aria-live="polite"></div>

      <div id="typing-indicator">
        <span class="dots"><span></span><span></span><span></span></span>
        <span id="typing-text"></span>
      </div>

      <div class="footer">
        <div>
          <div class="field-label">Apelido</div>
          <div class="row">
            <input id="name" type="text" maxlength="40" placeholder="Como quer ser chamado?" />
            <button type="button" id="btnName" class="btn-ghost">Salvar</button>
          </div>
        </div>
        <div>
          <div class="field-label">Mensagem</div>
          <div class="row">
            <input id="message" type="text" maxlength="2000" placeholder="Digite e pressione Enter..." />
            <button type="button" id="btnSend" class="btn-primary" disabled>Enviar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Rodapé da página -->
    <footer class="page-footer">
      Augusto Godoy &nbsp;·&nbsp; Vitor Milani &nbsp;·&nbsp; Henrique Gunter
    </footer>

    <script src="/app.js?v=6"></script>
  </body>
</html>
